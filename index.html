<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Bienvenido</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <div class="logo-icon-container">
                        <div class="logo-icon">
                            <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"></path>
                            </svg>
                        </div>
                        <div class="logo-pulse"></div>
                    </div>
                    <div class="logo-text">
                        <span class="logo-title">YouTube</span>
                        <span class="logo-subtitle">Rewards</span>
                    </div>
                </div>
            </div>
            
            <h1 class="welcome-title">Bienvenido a nuestra app</h1>
            <p class="welcome-subtitle">Ingresá tu correo electrónico para continuar</p>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@correo.com"
                        required
                        autocomplete="email"
                    >
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <button type="submit" class="login-button">
                    <span class="button-text">Continuar</span>
                    <span class="button-loader" id="loader"></span>
                </button>
            </form>
            
            <div class="footer-text">
                <p>Al continuar, aceptás nuestros <a href="#" class="link">Términos de Servicio</a> y nuestra <a href="#" class="link">Política de Privacidad</a></p>
            </div>
        </div>
    </div>
    
    <script src="assets/js/script.js"></script>
</body>
</html>
